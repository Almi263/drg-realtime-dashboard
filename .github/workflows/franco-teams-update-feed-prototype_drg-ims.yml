# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - drg-ims

on:
  push:
    branches:
      - franco/teams-update-feed-prototype
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install, build, and test
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm test

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          echo '{"name":"drg-ims","version":"0.1.0","scripts":{"start":"node server.js"}}' \
            > .next/standalone/package.json

      - name: Zip and deploy via Kudu (includes node_modules)
        env:
          PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7798D31F8A243C1BD2B6CC666D74586 }}
        run: |
          USERNAME=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          cd .next/standalone
          zip -r /tmp/deploy.zip . -x "*.DS_Store"
          echo "Zip size: $(du -sh /tmp/deploy.zip)"
          echo "node_modules/next in zip: $(unzip -l /tmp/deploy.zip | grep -c 'node_modules/next')"
          HTTP=$(curl -s -w "\n%{http_code}" -u "$USERNAME:$PASSWORD" -X POST \
            "https://drg-ims.scm.azurewebsites.net/api/zipdeploy?clean=true" \
            -H "Content-Type: application/zip" \
            --data-binary @/tmp/deploy.zip)
          echo "Deploy response: $HTTP"

      - name: Get actual Node.js error from Azure
        if: always()
        env:
          PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7798D31F8A243C1BD2B6CC666D74586 }}
        run: |
          USERNAME=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          echo "=== wwwroot ==="
          curl -s -u "$USERNAME:$PASSWORD" -X POST \
            "https://drg-ims.scm.azurewebsites.net/api/command" \
            -H "Content-Type: application/json" \
            -d '{"command":"ls","dir":"/home/site/wwwroot"}' || true
          echo "=== node_modules/next ==="
          curl -s -u "$USERNAME:$PASSWORD" -X POST \
            "https://drg-ims.scm.azurewebsites.net/api/command" \
            -H "Content-Type: application/json" \
            -d '{"command":"ls","dir":"/home/site/wwwroot/node_modules/next"}' || true
          echo "=== node server.js output ==="
          curl -s -u "$USERNAME:$PASSWORD" -X POST \
            "https://drg-ims.scm.azurewebsites.net/api/command" \
            -H "Content-Type: application/json" \
            -d '{"command":"bash -c \"timeout 8 node server.js 2>&1; true\"","dir":"/home/site/wwwroot"}' || true
