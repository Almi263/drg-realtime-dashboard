# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - drg-ims

on:
  push:
    branches:
      - franco/teams-update-feed-prototype
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install, build, and test
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm test

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          echo '{"name":"drg-ims","version":"0.1.0","scripts":{"start":"node server.js"}}' \
            > .next/standalone/package.json

      - name: Wipe stale wwwroot
        env:
          PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7798D31F8A243C1BD2B6CC666D74586 }}
        run: |
          USERNAME=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -s -u "$USERNAME:$PASSWORD" -X POST \
            "https://drg-ims.scm.azurewebsites.net/api/command" \
            -H "Content-Type: application/json" \
            -d '{"command":"rm -rf /home/site/wwwroot && mkdir -p /home/site/wwwroot","dir":"/"}'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'drg-ims'
          slot-name: 'Production'
          package: .next/standalone
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7798D31F8A243C1BD2B6CC666D74586 }}
