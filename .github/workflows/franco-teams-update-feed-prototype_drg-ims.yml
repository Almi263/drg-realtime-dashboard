# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - drg-ims

on:
  push:
    branches:
      - franco/teams-update-feed-prototype
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install, build, and test
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm test

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Minimal package.json — no dependencies or packageManager field,
          # so Oryx won't try to run npm install over the pre-built bundle
          echo '{"name":"drg-ims","version":"0.1.0","scripts":{"start":"node server.js"}}' \
            > .next/standalone/package.json
          # Sanity-check: fail the build if next wasn't traced into the bundle
          ls .next/standalone/node_modules/next/dist/server/lib/start-server.js

      - name: Smoke-test standalone server
        run: |
          cd .next/standalone
          node server.js &
          SERVER_PID=$!
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          kill $SERVER_PID
          echo "HTTP response: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || (echo "Server did not return 200" && exit 1)

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'drg-ims'
          slot-name: 'Production'
          package: .
          startup-command: 'node server.js'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7798D31F8A243C1BD2B6CC666D74586 }}
